<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pixel History Challenge</title>

<style>
body{
  margin:0;
  font-family: monospace;
  background:#1b1b2f;
  color:white;
  text-align:center;
}

.container{
  padding:40px;
}

button{
  padding:12px 20px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
  border:none;
  background:#e43f5a;
  color:white;
}

button:hover{
  background:#ff6b81;
}

.question{
  font-size:22px;
  margin-bottom:20px;
}

.score{
  position:fixed;
  top:10px;
  right:20px;
  font-size:18px;
}

.pixel-box{
  border:4px solid white;
  padding:30px;
  display:inline-block;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<audio id="bgm" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f0b5e9e8b.mp3?filename=8-bit-adventure-11266.mp3">
</audio>

<canvas id="confetti"></canvas>

<div class="score">
Điểm: <span id="score">0</span>
</div>

<div class="container">
<div class="pixel-box">

<h1>Pixel History Challenge</h1>

<div id="game">

<button onclick="startGame()">Bắt đầu</button>

</div>

</div>
</div>

<script>
let score = 0;
let current = 0;

const questions = [
{
q:"Trận Bạch Đằng nổi tiếng diễn ra năm nào?",
answers:["938","1010","1288","1407"],
correct:0
},
{
q:"Ai là người lập ra nhà Trần?",
answers:["Trần Thái Tông","Trần Thủ Độ","Trần Nhân Tông","Trần Hưng Đạo"],
correct:0
},
{
q:"Chiến thắng Điện Biên Phủ năm nào?",
answers:["1954","1945","1975","1968"],
correct:0
}
];

function startGame(){
showQuestion();
}

function showQuestion(){
let q = questions[current];

let html = `
<div class="question">${q.q}</div>
`;

q.answers.forEach((a,i)=>{
html += <button onclick="answer(${i})">${a}</button>;
});

document.getElementById("game").innerHTML = html;
}

function answer(i){
let q = questions[current];

if(i === q.correct){
score += 10;
document.getElementById("score").innerText = score;
confettiEffect();
}

current++;

if(current >= questions.length){
endGame();
}else{
showQuestion();
}
}

function endGame(){
document.getElementById("game").innerHTML = `
<h2>Kết thúc!</h2>
<p>Điểm của bạn: ${score}</p>
<button onclick="location.reload()">Chơi lại</button>
`;
}

function confettiEffect(){
let canvas = document.getElementById("confetti");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for(let i=0;i<80;i++){
pieces.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*6+4,
speed: Math.random()*3+2
});
}

let frame = 0;

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{
ctx.fillStyle="yellow";
ctx.fillRect(p.x,p.y,p.size,p.size);
p.y += p.speed;
});

frame++;
if(frame < 60){
requestAnimationFrame(draw);
}
}

draw();
}
</script>

</body>
</html>
